<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WebApp Mock - App</title>
    <style>
      :root {
        --bg-1: #0c1017;
        --bg-2: #171c26;
        --panel: #0f141f;
        --panel-2: #151c2b;
        --text: #eef1f6;
        --muted: #8e9aac;
        --line: #2b3446;
        --accent: #f0a420;
        --shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Bahnschrift", "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(700px 420px at 12% 12%, #1d2737 0%, transparent 60%),
          radial-gradient(520px 360px at 88% 0%, #2a2012 0%, transparent 55%),
          linear-gradient(140deg, var(--bg-1), var(--bg-2));
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 24px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(90deg, #111621, #141a27 50%, #0b0f16);
        animation: slideDown 0.6s ease-out both;
      }

      @keyframes slideDown {
        from { transform: translateY(-12px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand img {
        height: 28px;
        filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.4));
      }

      .brand div {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .brand span {
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }

      .brand strong {
        font-size: 15px;
        letter-spacing: 0.3px;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .chip {
        padding: 6px 12px;
        border-radius: 999px;
        border: 1px solid rgba(240, 164, 32, 0.35);
        background: rgba(240, 164, 32, 0.15);
        color: #f7cc7c;
        font-size: 11px;
        letter-spacing: 0.6px;
        text-transform: uppercase;
      }

      .icon-btn {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: rgba(12, 16, 24, 0.6);
        display: grid;
        place-items: center;
        cursor: pointer;
      }

      .icon-btn img {
        width: 18px;
        height: 18px;
        filter: brightness(0) invert(0.9);
      }

      .tabbar {
        padding: 0 24px 10px;
        position: relative;
      }

      .tabbar-strip {
        height: 6px;
        background-repeat: repeat-x;
      }

      .tabbar-strip.one {
        background-image: url("../images/tab/tabbar1.png");
      }

      .tabbar-strip.two {
        background-image: url("../images/tab/tabbar2.png");
      }

      .tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        padding-top: 10px;
      }

      .tab {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background-image:
          linear-gradient(135deg, rgba(8, 10, 16, 0.7), rgba(16, 20, 30, 0.7)),
          url("../images/tab/taboff.png");
        background-size: 100% 100%, 100% 100%;
        background-blend-mode: multiply;
        color: #f2f5fa;
        font-size: 12px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        animation: tabRise 0.5s ease-out both;
      }

      .tab img {
        width: 18px;
        height: 18px;
        filter: brightness(0) invert(0.95);
      }

      .tab.active {
        background-image:
          linear-gradient(135deg, rgba(42, 28, 10, 0.65), rgba(24, 18, 8, 0.65)),
          url("../images/tab/tabon.png");
        border-color: rgba(240, 164, 32, 0.45);
        box-shadow: 0 8px 18px rgba(240, 164, 32, 0.15);
      }

      .tab:nth-child(1) { animation-delay: 0.05s; }
      .tab:nth-child(2) { animation-delay: 0.1s; }
      .tab:nth-child(3) { animation-delay: 0.15s; }
      .tab:nth-child(4) { animation-delay: 0.2s; }
      .tab:nth-child(5) { animation-delay: 0.25s; }

      @keyframes tabRise {
        from { transform: translateY(8px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      .layout {
        display: grid;
        grid-template-columns: 240px 1fr;
        gap: 16px;
        padding: 12px 24px 24px;
      }

      .panel {
        background: linear-gradient(135deg, var(--panel), var(--panel-2));
        border: 1px solid var(--line);
        border-radius: 14px;
        box-shadow: var(--shadow);
      }

      .sidebar {
        padding: 16px;
        display: grid;
        gap: 16px;
      }

      .sidebar h3 {
        margin: 0;
        font-size: 14px;
        letter-spacing: 0.6px;
        text-transform: uppercase;
        color: var(--muted);
      }

      .area-list {
        display: grid;
        gap: 10px;
      }

      .area-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        font-size: 13px;
      }

      .area-item img {
        width: 20px;
        height: 20px;
      }

      .alarm-card {
        display: grid;
        gap: 6px;
        padding: 14px;
        border-radius: 12px;
        border: 1px solid rgba(240, 164, 32, 0.35);
        background: rgba(240, 164, 32, 0.08);
        font-size: 13px;
      }

      .alarm-card strong {
        font-size: 16px;
      }

      .content {
        display: grid;
        gap: 16px;
      }

      .map-panel {
        padding: 12px;
      }

      .map-frame {
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: #0b0e14;
        height: calc(100vh - 280px);
        min-height: 420px;
      }

      .map-frame iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: #0b0e14;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
        padding: 16px;
      }

      .stat {
        padding: 14px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(9, 12, 18, 0.6);
        display: grid;
        gap: 8px;
        font-size: 13px;
      }

      .stat strong {
        font-size: 18px;
      }

      .stat span {
        color: var(--muted);
      }

      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .map-frame {
          height: 55vh;
          min-height: 320px;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <img src="../images/top/boss_logo.svg" alt="Logo">
        <div>
          <strong>Supervisor Web</strong>
          <span>mock interface</span>
        </div>
      </div>
      <div class="status">
        <span class="chip">offline mode</span>
        <button class="icon-btn" type="button" title="Ajuda">
          <img src="../images/top/help.svg" alt="">
        </button>
        <button class="icon-btn" type="button" title="Idioma">
          <img src="../images/top/language.svg" alt="">
        </button>
        <button class="icon-btn" type="button" title="Sair">
          <img src="../images/top/logout.svg" alt="">
        </button>
      </div>
    </header>

    <section class="tabbar">
      <div class="tabbar-strip one"></div>
      <div class="tabbar-strip two"></div>
      <div class="tabs">
        <div class="tab active"><img src="../images/tab_icons/main.svg" alt="">Dashboard</div>
        <div class="tab"><img src="../images/tab_icons/devices.svg" alt="">Dispositivos</div>
        <div class="tab"><img src="../images/tab_icons/alarm.svg" alt="">Alarmes</div>
        <div class="tab"><img src="../images/tab_icons/scheduler.svg" alt="">Agenda</div>
        <div class="tab"><img src="../images/tab_icons/report.svg" alt="">Relatorios</div>
      </div>
    </section>

    <div class="layout">
      <aside class="panel sidebar">
        <div>
          <h3>Areas</h3>
          <div class="area-list">
            <div class="area-item">
              <img src="../images/top/areaon.png" alt="">
              Camara Fria
            </div>
            <div class="area-item">
              <img src="../images/top/areaoff.png" alt="">
              Sala Maquinas
            </div>
            <div class="area-item">
              <img src="../images/top/areaoff.png" alt="">
              Central Ar
            </div>
          </div>
        </div>
        <div class="alarm-card">
          <span>Alarmes ativos</span>
          <strong>2</strong>
          <span>Ultima atualizacao: 10:22</span>
        </div>
        <div class="alarm-card">
          <span>Status conexao</span>
          <strong>Offline</strong>
          <span>Sem backend</span>
        </div>
      </aside>

      <main class="content">
        <section class="panel map-panel">
          <div class="map-frame">
            <iframe title="Mapa offline" src="../custom/default_maps/mpxone_advanced_modbus/Main/index.htm"></iframe>
          </div>
        </section>
        <section class="panel stats">
          <div class="stat">
            <span>Dispositivos</span>
            <strong>18</strong>
            <span>Online: 16</span>
          </div>
          <div class="stat">
            <span>Alarmes</span>
            <strong>2</strong>
            <span>Criticos: 1</span>
          </div>
          <div class="stat">
            <span>Eventos</span>
            <strong>24</strong>
            <span>Ultimas 24h</span>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
