 <script type="text/ecmascript"><![CDATA[webMI.proxy({"":[function(webMI,window,document,self){webMI.data.subscribe("10.10.12.151/$dev$.Integers.sbrinamento 1 - Giorno/i | BAS_td1_d__", function(e) {
var id = "id_36";
var value = e.value;
if (value == 0)
	webMI.gfx.setText(id, "Disabled");
if (value == 1)
	webMI.gfx.setText(id, "Monday");
if (value == 2)
	webMI.gfx.setText(id, "Tuesday");
if (value == 3)
	webMI.gfx.setText(id, "Wednesday");
if (value == 4)
	webMI.gfx.setText(id, "Thursday");
if (value == 5)
	webMI.gfx.setText(id, "Friday");
if (value == 6)
	webMI.gfx.setText(id, "Saturday");
if (value == 7)
	webMI.gfx.setText(id, "Sunday");
if (value == 8)
	webMI.gfx.setText(id, "Monday to Friday");
if (value == 9)
	webMI.gfx.setText(id, "Monday to Saturday");
if (value == 10)
	webMI.gfx.setText(id, "Saturday and Sunday");
if (value == 11)
	webMI.gfx.setText(id, "All days");

});

webMI.data.subscribe("10.10.12.151/$dev$.Integers.Numero di defrost distribuiti per la fascia oraria di td1 | BAS_d1S", function(e) {
var id = "id_41";
var value = e.value;
webMI.gfx.setText(id, value);

});

webMI.data.subscribe("10.10.12.151/$dev$.Integers.sbrinamento 1 - Minuto | BAS_td1_m__", function(e) {
var id = "id_42";
var value = e.value;
webMI.gfx.setText(id, value);

});

webMI.data.subscribe("10.10.12.151/$dev$.Integers.sbrinamento 1 - Ora | BAS_td1_h__", function(e) {
var id = "id_43";
var value = e.value;
webMI.gfx.setText(id, value);

});

webMI.data.subscribe("10.10.12.151/$dev$.Digitals.sbrinamento 1 - Power defrost | BAS_td1_P__", function(e) {
var id = "id_56";
var value = e.value;
if (value == false)
	webMI.gfx.setText(id, "Disabled");
if (value == true)
	webMI.gfx.setText(id, "Enabled");

});

webMI.data.subscribe("10.10.12.151/$dev$.Integers.sbrinamento 1 - Minuto | BAS_td1_m__", function(e) {
var id = "id_59";
var value = e.value;
if (0 <= value && value < 1)
	webMI.gfx.setVisible(id, true);
if (1 <= value && value < 60)
	webMI.gfx.setVisible(id, false);

});

webMI.data.subscribe("10.10.12.151/$dev$.Integers.sbrinamento 1 - Ora | BAS_td1_h__", function(e) {
var id = "id_60";
var value = e.value;
if (0 <= value && value < 1)
	webMI.gfx.setVisible(id, true);
if (1 <= value && value < 23)
	webMI.gfx.setVisible(id, false);

});
},{},{}]},window);]]></script>
