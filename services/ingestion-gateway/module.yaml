id: ingestion-gateway
name: Ingestion Gateway
type: service
package: com.kryos.platform.ingestiongateway
riskLevel: medium
stage: structure-only
responsibilities:
- Autenticar cada coletor de borda por credencial única (mTLS ou token rotacionável).
- Validar o envelope da mensagem (cabeçalhos obrigatórios do ADR-0005) antes de publicar.
- Publicar telemetria bruta separada por classe REAL_TIME e HISTORY, preservando a
  decisão de prioridade que o coletor já tomou na borda.
dependsOn:
- shared/messaging-common
- shared/security-common
- shared/tenant-context
publishesEvents:
- kryos.data:{tenant}.telemetry.raw.realtime
- kryos.data:{tenant}.telemetry.raw.history
consumesEvents: []
databases:
  postgres:
    planned: false
  redis:
    planned: false
  rabbitmq:
    planned: true
    role: publica/consome via shared/messaging-common conforme ADR-0005
  questdb:
    planned: false
  clickhouse:
    planned: false
requiredQualityGates:
- readme-present
- module-manifest-present
- no-business-code
requiredHumanApprovalFor:
- domain implementation
- external integration
notes: 'Structure-only manifest. Plano: Data Plane. Mensageria conforme docs/adr/0005-rabbitmq-unified-messaging-backbone.md.'
