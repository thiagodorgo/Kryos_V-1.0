id: incident-service
name: Incident Service
type: service
package: com.kryos.platform.incidentservice
riskLevel: medium
stage: structure-only
responsibilities:
- Abrir incidente a partir de alarme (ou correlação de múltiplos alarmes do mesmo
  ativo).
- 'Rastrear SLA: tempo até ACK, tempo até normalização, reincidência por ativo.'
- Encerrar incidente com evidência vinculada (ação corretiva, foto pós-reparo).
dependsOn:
- shared/messaging-common
- shared/tenant-context
publishesEvents:
- kryos.operational:{tenant}.incident.opened
- kryos.operational:{tenant}.incident.closed
consumesEvents:
- kryos.event:{tenant}.alarm.raised
databases:
  postgres:
    planned: true
    purpose: incidentes, SLA, ações corretivas vinculadas
    schemas: []
  redis:
    planned: false
  rabbitmq:
    planned: true
    role: publica/consome via shared/messaging-common conforme ADR-0005
  questdb:
    planned: false
  clickhouse:
    planned: false
requiredQualityGates:
- readme-present
- module-manifest-present
- no-business-code
requiredHumanApprovalFor:
- domain implementation
- external integration
notes: 'Structure-only manifest. Plano: Operational Plane. Mensageria conforme docs/adr/0005-rabbitmq-unified-messaging-backbone.md.'
