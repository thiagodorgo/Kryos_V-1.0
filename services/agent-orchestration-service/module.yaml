id: agent-orchestration-service
name: Agent Orchestration Service
type: service
package: com.kryos.platform.agentorchestrationservice
riskLevel: medium
stage: structure-only
responsibilities:
- Calcular health score e sinais de tendência (recuperação de degelo, corrente de
  compressor) a partir de telemetria histórica.
- Gerar recomendação com explicação (causa provável + ação sugerida), nunca uma ordem
  direta.
- Registrar toda recomendação no decision ledger antes de encaminhar ao policy-engine.
dependsOn:
- shared/messaging-common
- shared/ai-common
- shared/tenant-context
publishesEvents:
- kryos.agent:{tenant}.recommendation.created
consumesEvents:
- kryos.data:{tenant}.telemetry.normalized.history
- kryos.event:{tenant}.alarm.raised
databases:
  postgres:
    planned: true
    purpose: decision ledger, histórico de recomendações
    schemas: []
  redis:
    planned: false
  rabbitmq:
    planned: true
    role: publica/consome via shared/messaging-common conforme ADR-0005
  questdb:
    planned: false
  clickhouse:
    planned: false
requiredQualityGates:
- readme-present
- module-manifest-present
- no-business-code
requiredHumanApprovalFor:
- domain implementation
- external integration
notes: 'Structure-only manifest. Plano: Agent Orchestration Plane. Mensageria conforme
  docs/adr/0005-rabbitmq-unified-messaging-backbone.md.'
