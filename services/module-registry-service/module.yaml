id: module-registry-service
name: Module Registry Service
type: service
package: com.kryos.platform.moduleregistryservice
riskLevel: medium
stage: structure-only
responsibilities:
- Manter o catálogo de módulos disponíveis e o que está habilitado por tenant.
- Reagir a mudança de plano habilitando/desabilitando módulo automaticamente.
dependsOn:
- shared/messaging-common
- shared/tenant-context
publishesEvents:
- kryos.control:{tenant}.module.enabled
- kryos.control:{tenant}.module.disabled
consumesEvents:
- kryos.control:{tenant}.plan.changed
databases:
  postgres:
    planned: true
    purpose: catálogo de módulos, habilitação por tenant
    schemas: []
  redis:
    planned: false
  rabbitmq:
    planned: true
    role: publica/consome via shared/messaging-common conforme ADR-0005
  questdb:
    planned: false
  clickhouse:
    planned: false
requiredQualityGates:
- readme-present
- module-manifest-present
- no-business-code
requiredHumanApprovalFor:
- domain implementation
- external integration
notes: 'Structure-only manifest. Plano: Control Plane. Mensageria conforme docs/adr/0005-rabbitmq-unified-messaging-backbone.md.'
