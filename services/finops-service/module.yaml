id: finops-service
name: Finops Service
type: service
package: com.kryos.platform.finopsservice
riskLevel: medium
stage: structure-only
responsibilities:
- Cruzar uso medido com custo de infraestrutura real por tenant/módulo.
- Expor margem por plano para decisão comercial (não exposto ao cliente final).
dependsOn:
- shared/messaging-common
- shared/billing-common
- shared/tenant-context
publishesEvents: []
consumesEvents:
- kryos.control:{tenant}.usage.aggregated
databases:
  postgres:
    planned: false
  redis:
    planned: false
  rabbitmq:
    planned: true
    role: publica/consome via shared/messaging-common conforme ADR-0005
  questdb:
    planned: false
  clickhouse:
    planned: true
    purpose: custo agregado por tenant/módulo
requiredQualityGates:
- readme-present
- module-manifest-present
- no-business-code
requiredHumanApprovalFor:
- domain implementation
- external integration
notes: 'Structure-only manifest. Plano: Control Plane. Mensageria conforme docs/adr/0005-rabbitmq-unified-messaging-backbone.md.'
